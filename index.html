  <body>
    <script>
      // Apply cached colors immediately to prevent flash
      (function() {
        try {
          const cachedColors = localStorage.getItem('platform_colors');
          if (cachedColors) {
            const colors = JSON.parse(cachedColors);
            const root = document.documentElement;
            
            // Helper to convert hex to HSL
            function hexToHSL(hex) {
              hex = hex.replace(/^#/, '');
              const r = parseInt(hex.substring(0, 2), 16) / 255;
              const g = parseInt(hex.substring(2, 4), 16) / 255;
              const b = parseInt(hex.substring(4, 6), 16) / 255;
              
              const max = Math.max(r, g, b);
              const min = Math.min(r, g, b);
              let h = 0, s = 0, l = (max + min) / 2;
              
              if (max !== min) {
                const d = max - min;
                s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
                
                switch (max) {
                  case r: h = ((g - b) / d + (g < b ? 6 : 0)) / 6; break;
                  case g: h = ((b - r) / d + 2) / 6; break;
                  case b: h = ((r - g) / d + 4) / 6; break;
                }
              }
              
              h = Math.round(h * 360);
              s = Math.round(s * 100);
              l = Math.round(l * 100);
              
              return `${h} ${s}% ${l}%`;
            }
            
            // Determine current theme
            const savedTheme = localStorage.getItem('theme');
            const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            const currentTheme = savedTheme === 'system' || !savedTheme 
              ? (prefersDark ? 'dark' : 'light')
              : savedTheme;
            
            const prefix = currentTheme === 'light' ? 'light' : 'dark';
            
            // Apply colors immediately
            const colorMap = {
              [`${prefix}_background`]: '--background',
              [`${prefix}_foreground`]: '--foreground',
              [`${prefix}_card`]: '--card',
              [`${prefix}_primary`]: '--primary',
              [`${prefix}_secondary`]: '--secondary',
              [`${prefix}_accent`]: '--accent',
              [`${prefix}_muted`]: '--muted',
              [`${prefix}_border`]: '--border',
            };
            
            Object.entries(colorMap).forEach(([key, cssVar]) => {
              if (colors[key]) {
                root.style.setProperty(cssVar, colors[key]);
                
                // Apply derived colors
                if (cssVar === '--primary') {
                  root.style.setProperty('--ring', colors[key]);
                  root.style.setProperty('--sidebar-primary', colors[key]);
                  root.style.setProperty('--sidebar-ring', colors[key]);
                }
                if (cssVar === '--background') {
                  root.style.setProperty('--chart-bg', colors[key]);
                  root.style.setProperty('--panel-bg', colors[key]);
                  root.style.setProperty('--sidebar-background', colors[key]);
                }
                if (cssVar === '--card') {
                  root.style.setProperty('--card-foreground', colors[`${prefix}_foreground`] || colors[key]);
                  root.style.setProperty('--popover', colors[key]);
                }
                if (cssVar === '--foreground') {
                  root.style.setProperty('--sidebar-foreground', colors[key]);
                }
                if (cssVar === '--muted') {
                  root.style.setProperty('--muted-foreground', colors[`${prefix}_foreground`] || '');
                }
                if (cssVar === '--accent') {
                  root.style.setProperty('--accent-foreground', colors[`${prefix}_foreground`] || '');
                  root.style.setProperty('--sidebar-accent', colors[key]);
                  root.style.setProperty('--sidebar-accent-foreground', colors[`${prefix}_foreground`] || '');
                }
                if (cssVar === '--secondary') {
                  root.style.setProperty('--secondary-foreground', colors[`${prefix}_foreground`] || '');
                }
                if (cssVar === '--border') {
                  root.style.setProperty('--input', colors[key]);
                  root.style.setProperty('--sidebar-border', colors[key]);
                }
              }
            });
            
            // Apply success color
            if (colors.success_color) {
              const successHSL = hexToHSL(colors.success_color);
              root.style.setProperty('--success', successHSL);
              root.style.setProperty('--success-foreground', '0 0% 100%');
            }
          }
        } catch (e) {
          console.error('Error applying cached colors:', e);
        }
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
